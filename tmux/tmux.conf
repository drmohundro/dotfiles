# tmux configuration
# Alt-based no-prefix bindings mirror the ghostty Cmd shortcuts.
# Requires `macos-option-as-alt = left` in ../ghostty/config.

# ─── Prefix ────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix              # double-tap to send literal Ctrl+A

# ─── Core ──────────────────────────────────────────────────────────
set -g default-shell /opt/homebrew/bin/fish

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"

# Kitty keyboard protocol — lets Alt+[ / Alt+] bind cleanly (otherwise
# they collide with the CSI escape syntax that ESC+[ also opens).
set -s extended-keys on
set -as terminal-features ",xterm-ghostty:extkeys"

set -g mouse on
set -g history-limit 50000
set -g escape-time 10              # low but non-zero so Alt-keys disambiguate
set -g focus-events on
set -g base-index 1                # 1-indexed windows — matches Alt+1..9
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Copy mode (vi keys + macOS clipboard) ─────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ─── Reload ────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── No-prefix Alt bindings (mirror ghostty Cmd shortcuts) ─────────
# New window               — Cmd+T
bind -n M-t new-window -c "#{pane_current_path}"

# Switch to window N       — Ctrl+1..9 (Alt+1..5 conflicts with flashspace)
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# Splits
# Alt+D       — split right (mirrors Cmd+D)
# Alt+Shift+D — split down  (mirrors Cmd+Shift+D)
# Alt+V       — split down  (backup; reliable mnemonic in case the Shift form fails)
#
# Note: tmux 3.5a changed Meta+Shift syntax. The correct form for Alt+Shift+D
# with extended-keys is now `M-S-D` (capital + explicit S-), not `M-D` or `M-S-d`.
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-S-D split-window -v -c "#{pane_current_path}"

# Pane cycling             — Alt+[ / Alt+] (in-order, by pane index)
bind -n M-[ select-pane -t :.-
bind -n M-] select-pane -t :.+

# Pane navigation          — Cmd+arrows analog (directional)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window cycling           — Alt+Shift+[ / Alt+Shift+]
# Shift escalates from in-window (pane cycling) to between windows.
# Post-3.5a tmux syntax: use the shifted character + explicit S- modifier.
bind -n M-S-'{' previous-window
bind -n M-S-'}' next-window

# Close pane               — Cmd+W
bind -n M-w kill-pane

# ─── Catppuccin Macchiato (manual colors) ──────────────────────────
# Matches `theme = Catppuccin Macchiato` in ghostty config.
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e2030,fg=#cad3f5"

set -g status-left " #[fg=#c6a0f6,bold]#S#[default] "
set -g status-right "#[fg=#a6da95]%a %b %d #[fg=#8aadf4]%H:%M "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1e2030,bg=#c6a0f6,bold] #I:#W "
set -g window-status-separator ""

set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#c6a0f6"
set -g message-style "bg=#c6a0f6,fg=#1e2030"

# ─── Plugins (tpm) ─────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpm — keep at the very end.
run '~/.config/tmux/plugins/tpm/tpm'
