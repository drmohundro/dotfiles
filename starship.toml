# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = "[❯](red)[❯](yellow)[❯](green) "

right_format = """$all"""

add_newline = false

[character]
success_symbol = ''
error_symbol = '[✗](bold red) '

[directory]
fish_style_pwd_dir_length = 1

[docker_context]
disabled = true
